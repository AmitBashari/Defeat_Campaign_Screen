<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulk Up, Hero - Direct UI Transition Flow</title>
    <style>
        :root {
            --bg-color: #0c0d10;
            --overlay-color: rgba(0, 0, 0, 0.78);
            --card-color: #fffaf0;
            --text-color: #1a1b1e;
            --go-btn-color: #ff5964;
            --go-btn-active: #c74a52; /* Darker red for pressed state */
            
            /* ⚡ Physics ⚡ */
            --intro-pop: cubic-bezier(0.1, 2.3, 0.25, 1.0);  
            --card-snap: cubic-bezier(0.17, 0.84, 0.44, 1.3);
            
            /* Snappy direct easing for tap feedback, no elastic overshoot */
            --tap-easing: cubic-bezier(0.2, 0, 0.2, 1); 
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'system-ui', -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-user-select: none; 
            user-select: none;
        }

        body {
            background-color: var(--bg-color);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            flex-direction: column;
            gap: 20px;
        }

        /* Phone Blueprint Frame */
        .phone-canvas {
            width: 380px;
            height: 780px;
            background: linear-gradient(to bottom, #4f7cac, #213a5f);
            position: relative;
            border-radius: 44px;
            border: 12px solid #000;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* HARD RESET SWITCH */
        .phone-canvas.instant-reset * {
            transition: none !important;
            animation: none !important;
        }

        /* Dimmer Overlay */
        .dimmer-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--overlay-color);
            opacity: 0;
            transition: opacity 0.5s ease;
            z-index: 1;
        }
        .phone-canvas.active .dimmer-overlay { opacity: 1; }

        /* Scene 1: Main Menu Payload */
        .ui-payload {
            position: relative;
            z-index: 2;
            width: 88%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        /* Dynamic Header */
        .hero-title {
            color: #ffda62;
            font-size: 2.3rem;
            font-weight: 900;
            text-transform: uppercase;
            text-shadow: 0 4px 0px #b03a2e, 0 8px 18px rgba(0,0,0,0.6);
            letter-spacing: 1.5px;
            transform: scale(0);
            text-align: center;
        }
        .phone-canvas.active .hero-title {
            animation: introHeaderPop 0.6s var(--intro-pop) forwards;
            animation-delay: 0.1s;
        }

        /* Kinetic Card Stack */
        .action-card-stack {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .action-card {
            background-color: var(--card-color);
            border: 4px solid #fff;
            border-radius: 20px;
            padding: 18px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            color: var(--text-color);
            box-shadow: 0 8px 0px #d8a880, 0 12px 24px rgba(0,0,0,0.4);
            transform: translateX(-160%);
            /* Transitions for hover/active states of the CARD itself */
            transition: transform 0.6s var(--card-snap), box-shadow 0.15s var(--tap-easing), background-color 0.15s var(--tap-easing);
            cursor: pointer;
        }
        
        .action-card:hover { background-color: #fffdf9; }

        .card-left-payload { display: flex; align-items: center; gap: 16px; }
        
        /* Icons are static upon intro, no further interaction animation */
        .card-icon {
            font-size: 2rem;
            opacity: 0;
            transform: scale(0);
            transition: opacity 0.3s ease, transform 0.5s var(--intro-pop);
        }
        
        .card-label { font-weight: 800; font-size: 1.15rem; flex: 1; }

        /* Staggered Intro Entry */
        .phone-canvas.active .action-card:nth-child(1) { transform: translateX(0); transition-delay: 0.4s; }
        .phone-canvas.active .action-card:nth-child(1) .card-icon { opacity: 1; transform: scale(1); transition-delay: 0.75s; }
        .phone-canvas.active .action-card:nth-child(2) { transform: translateX(0); transition-delay: 0.52s; }
        .phone-canvas.active .action-card:nth-child(2) .card-icon { opacity: 1; transform: scale(1); transition-delay: 0.87s; }
        .phone-canvas.active .action-card:nth-child(3) { transform: translateX(0); transition-delay: 0.64s; }
        .phone-canvas.active .action-card:nth-child(3) .card-icon { opacity: 1; transform: scale(1); transition-delay: 0.99s; }

        /* "Go" Button Styling & Intro */
        .go-btn {
            background-color: var(--go-btn-color);
            color: white;
            border: none;
            padding: 10px 20px;
            font-weight: 800;
            font-size: 1rem;
            border-radius: 12px;
            box-shadow: 0 4px 0 #b33940;
            cursor: pointer;
            outline: none;
            transform: scale(0);
            /* Transition for Intro & Settle Back */
            transition: transform 0.4s var(--intro-pop), box-shadow 0.1s var(--tap-easing), background-color 0.1s var(--tap-easing);
            pointer-events: none; /* In wireframe, click card to activate btn logic */
        }
        .phone-canvas.active .action-card:nth-child(1) .go-btn { transform: scale(1); transition-delay: 0.8s; }
        .phone-canvas.active .action-card:nth-child(2) .go-btn { transform: scale(1); transition-delay: 0.92s; }
        .phone-canvas.active .action-card:nth-child(3) .go-btn { transform: scale(1); transition-delay: 1.04s; }
        
        /* ⚡ SIMPLE TACTILE GO BUTTON TAP ⚡ */
        
        /* 1. Direct Push-In on Press */
        .action-card:active {
            box-shadow: 0 4px 0px #d8a880, 0 6px 12px rgba(0,0,0,0.3); /* Flatten card shadow */
            background-color: #f7f3eb; /* Subtle Card Darken */
        }

        .action-card:active .go-btn {
            transform: scale(0.92) translateY(2px) !important; /* Snappy Push In */
            box-shadow: 0 1px 0 #b33940 !important; /* Flatten Button Shadow */
            background-color: var(--go-btn-active) !important;
            transition: transform 0.05s var(--tap-easing), box-shadow 0.05s var(--tap-easing), background-color 0.05s var(--tap-easing) !important; /* Immediate feedback */
        }
        
        /* Icon and Label DO NOT animate on tap. Their transition properties are restricted. */

        /* Timer Module Intro */
        .timer-module {
            background-color: #fff;
            padding: 10px 24px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 800;
            color: #333;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            transform: scale(0);
            opacity: 0;
            transition: transform 0.5s var(--intro-pop), opacity 0.4s ease;
            transition-delay: 1.1s;
        }
        .phone-canvas.active .timer-module { transform: scale(1); opacity: 1; }
        .tick-tock-icon { font-size: 1.3rem; animation: globalWobble 1s ease-in-out infinite alternate; }

        /* Keyframes */
        @keyframes introHeaderPop { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes globalWobble { 0% { transform: rotate(-10deg) scale(0.98); } 100% { transform: rotate(10deg) scale(1.05); } }

        /* UI Exit State Choreography */
        .phone-canvas.end-sequence-trigger .dimmer-overlay { opacity: 0; transition-delay: 0.1s; }
        .phone-canvas.end-sequence-trigger .action-card { transform: translateX(-160%) !important; transition: transform 0.35s cubic-bezier(0.6, -0.28, 0.735, 0.045) !important; }
        .phone-canvas.end-sequence-trigger .action-card:nth-child(1) { transition-delay: 0s !important; }
        .phone-canvas.end-sequence-trigger .action-card:nth-child(2) { transition-delay: 0.03s !important; }
        .phone-canvas.end-sequence-trigger .action-card:nth-child(3) { transition-delay: 0.06s !important; }
        .phone-canvas.end-sequence-trigger .timer-module { transform: scale(0); opacity: 0; transition: transform 0.2s ease, opacity 0.2s ease !important; transition-delay: 0s !important; }
        .phone-canvas.end-sequence-trigger .hero-title { animation: finaleBounceExit 0.5s cubic-bezier(0.3, 0, 0.8, 0.15) forwards; } /* tighter exit */
        @keyframes finaleBounceExit { 0% { transform: scale(1); } 100% { transform: scale(0); opacity: 0; } }

        /* =========================================================
           SCENE 2: The Direct Transition System
           ========================================================= */
        .black-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease; /* Snappy wipe */
        }
        .black-screen.active { opacity: 1; pointer-events: all; }

        .target-feature-screen {
            position: absolute;
            z-index: 5;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.4s var(--tap-easing); /* Direct float up */
            pointer-events: none;
        }
        .target-feature-screen.active { opacity: 1; transform: translateY(0); pointer-events: all; }
        
        .target-feature-screen h2 {
            color: #fff;
            font-size: 2.8rem;
            font-weight: 900;
            text-align: center;
            text-transform: uppercase;
            text-shadow: 0 4px 10px rgba(0,0,0,0.5);
            letter-spacing: 1px;
        }

        /* Reset Button */
        .master-btn { background-color: #ff4757; color: white; border: none; padding: 15px 30px; font-weight: 800; font-size: 1rem; border-radius: 14px; cursor: pointer; box-shadow: 0 6px 0 #b33139; margin-top: 10px; }
        .master-btn:active { transform: translateY(3px); box-shadow: 0 3px 0 #b33139; }
    </style>
</head>
<body>

    <div class="phone-canvas" id="appCanvas">
        
        <div class="black-screen" id="blackScreen"></div>

        <div class="target-feature-screen" id="targetScreen">
            <h2 id="targetText">Feature Loaded</h2>
        </div>

        <div class="dimmer-overlay"></div>
        <div class="ui-payload" id="uiPayload">
            <h1 class="hero-title">Bulk Up, Hero</h1>

            <div class="action-card-stack" id="actionStack">
                <div class="action-card" data-feature="Forge">
                    <div class="card-left-payload"><span class="card-icon">🛠️</span><span class="card-label">Forge Gear</span></div>
                    <button class="go-btn">Go</button>
                </div>
                
                <div class="action-card" data-feature="Wishing Well">
                    <div class="card-left-payload"><span class="card-icon">🧬</span><span class="card-label">Summon Skills & Pets</span></div>
                    <button class="go-btn">Go</button>
                </div>
                
                <div class="action-card" data-feature="Dungeons menu">
                    <div class="card-left-payload"><span class="card-icon">⚔️</span><span class="card-label">Replay Dungeons</span></div>
                    <button class="go-btn">Go</button>
                </div>
            </div>

            <div class="timer-module">
                <span class="tick-tock-icon">🕒</span>
                <span>Auto-closes in <span id="countdownTicks">5</span>s</span>
            </div>
        </div>
    </div>

    <button class="master-btn" onclick="startKineticSequence()">⚡ Reset System Loop</button>

    <script>
        const appCanvas = document.getElementById('appCanvas');
        const countdownTicks = document.getElementById('countdownTicks');
        const actionStack = document.getElementById('actionStack');
        const cards = actionStack.querySelectorAll('.action-card');
        
        const blackScreen = document.getElementById('blackScreen');
        const targetScreen = document.getElementById('targetScreen');
        const targetText = document.getElementById('targetText');
        const uiPayload = document.getElementById('uiPayload');

        let masterTimer;
        let lingerTimeout;

        // --- Core Interaction & Direct Scene Handoff ---
        cards.forEach(card => {
            const featureName = card.getAttribute('data-feature'); 

            card.addEventListener('click', () => {
                // Clicking initiates handoff immediately.

                // 1. Destroy Auto-close
                clearInterval(masterTimer);
                clearTimeout(lingerTimeout);
                
                // 2. Direct Transition Flow
                // A very short hold time (120ms) allows the visual compression/push-in
                // of the :active CSS state to be registered by the player before whipping away.
                setTimeout(() => {
                    // Start menu exit
                    appCanvas.classList.add('end-sequence-trigger');
                    
                    // Direct Fade-in Black Screen as UI leaves
                    setTimeout(() => {
                        blackScreen.classList.add('active');
                        
                        // Scene swap logic behind the curtain
                        setTimeout(() => {
                            uiPayload.style.display = 'none'; // Clear menu payload
                            targetText.textContent = featureName; // Set mid-screen feature text
                            targetScreen.classList.add('active'); // Prepare new scene
                            
                            // Fade out curtain to reveal scene
                            blackScreen.classList.remove('active');
                            
                        }, 400); // Black curtain hold time

                    }, 200); // Wait for cards to begin exit slide
                }, 120); // <-- FIXED: Removed "ms" syntax error here
            });
        });

        // --- Master Sequence Loop (Includes Scene 2 Reset) ---
        function startKineticSequence() {
            clearInterval(masterTimer);
            clearTimeout(lingerTimeout);

            appCanvas.classList.add('instant-reset');
            appCanvas.classList.remove('active', 'end-sequence-trigger');
            
            blackScreen.classList.remove('active');
            targetScreen.classList.remove('active');
            uiPayload.style.display = 'flex'; 
            
            void appCanvas.offsetWidth; // Repaint
            
            appCanvas.classList.remove('instant-reset');
            let timeRemaining = 5;
            countdownTicks.textContent = timeRemaining;
            appCanvas.classList.add('active');

            setTimeout(() => {
                masterTimer = setInterval(() => {
                    timeRemaining--;
                    countdownTicks.textContent = timeRemaining;
                    
                    if (timeRemaining === 0) {
                        clearInterval(masterTimer);
                        lingerTimeout = setTimeout(() => {
                            appCanvas.classList.add('end-sequence-trigger');
                        }, 600);
                    }
                }, 1000);
            }, 1200); 
        }

        window.onload = startKineticSequence;
    </script>
</body>
</html>
